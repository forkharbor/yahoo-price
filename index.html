<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yahoo!ショッピング 価格調査</title>
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #d1d9e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    h1 {
      font-size: 1.3rem;
      color: #e0e6f0;
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .subtitle {
      font-size: 0.78rem;
      color: #4a5568;
      margin-bottom: 36px;
    }

    /* ── 検索フォーム ── */
    .card {
      background: #111827;
      border: 1px solid #1e2a3a;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      color: #8899aa;
      font-weight: bold;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: #0d1420;
      border: 1px solid #2a3a50;
      border-radius: 8px;
      color: #e0e6f0;
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .field input:focus { border-color: #2563eb; }
    .field input::placeholder { color: #3a4a60; }

    .price-wrap { position: relative; }
    .price-wrap input { text-align: right; padding-right: 32px; }
    .price-unit {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      color: #4a5568;
      pointer-events: none;
    }

    /* カテゴリボタン */
    .cat-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .cat-btn {
      padding: 7px 14px;
      background: #1a2535;
      border: 1px solid #2a3a50;
      border-radius: 20px;
      color: #8899aa;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .cat-btn.active {
      background: #0f2d55;
      border-color: #2563eb;
      color: #93c5fd;
      font-weight: bold;
    }
    .cat-btn[data-cat="ポケモンカード"].active { background: #2a1a00; border-color: #7a4a00; color: #f0b030; }
    .cat-btn[data-cat="遊戯王カード"].active     { background: #1a0a2e; border-color: #5b2a8e; color: #a855f7; }
    .cat-btn[data-cat="ワンピースカード"].active { background: #2e0a0a; border-color: #8e2a2a; color: #f87171; }
    .cat-btn[data-cat="ゲーム"].active           { background: #0a2020; border-color: #0e6060; color: #2dd4bf; }
    .cat-btn[data-cat="その他トレカ"].active     { background: #1a2a1a; border-color: #2a6a2a; color: #4ade80; }
    .cat-btn[data-cat="フィギュア"].active       { background: #2a1a2e; border-color: #7a2a8e; color: #e879f9; }
    .cat-btn[data-cat="その他"].active           { background: #1a2535; border-color: #4a90d9; color: #4a90d9; }

    .form-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .form-title {
      font-size: 0.78rem;
      color: #4a90d9;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .btn-cancel-edit {
      font-size: 0.72rem;
      color: #8899aa;
      background: #1a2535;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
    }

    .btn-search {
      width: 100%;
      padding: 15px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-search:hover { background: #1e40af; }
    .btn-search:active { background: #1e3a9f; }
    .btn-search.editing { background: #065f46; }
    .btn-search.editing:hover { background: #064e3b; }

    .btn-records-edit {
      font-size: 0.7rem;
      color: #4a90d9;
      background: none;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-records-edit:hover { background: #1a2a40; }
    .select-mode .btn-records-edit { display: none; }
    .btn-admin, .btn-star {
      font-size: 0.7rem;
      color: #8899aa;
      background: none;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-admin.active { color: #d97706; border-color: #f59e0b; background: #fffbeb; }
    .btn-star { display: none; color: #b08900; border-color: #e8cf78; }
    .admin-mode .btn-star { display: inline-block; }
    .history-star { color: #e3aa18; font-size: 1rem; flex-shrink: 0; }
    .password-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(67, 49, 42, 0.28);
    }
    .password-dialog {
      width: 100%;
      max-width: 360px;
      padding: 24px;
      border: 1px solid #eaded8;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(78, 53, 43, 0.2);
    }
    .password-dialog h3 { margin-bottom: 8px; color: #493a35; font-size: 1rem; }
    .password-dialog p { margin-bottom: 14px; color: #806a61; font-size: 0.82rem; line-height: 1.5; }
    .password-dialog input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #dfd0c9;
      border-radius: 8px;
      outline: none;
      font-size: 1rem;
    }
    .password-dialog input:focus { border-color: #ef8f88; }
    .password-actions { display: flex; gap: 8px; margin-top: 16px; }
    .password-actions button { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .password-cancel { border: 1px solid #dfd0c9; background: #ffffff; color: #806a61; }
    .password-submit { border: 1px solid #e77f78; background: #ef8f88; color: #ffffff; }

    /* ── 履歴 ── */
    .records-section {
      width: 100%;
      max-width: 480px;
    }

    .records-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .records-header h2 {
      font-size: 0.78rem;
      color: #4a90d9;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }

    .btn-select-records, .btn-duplicate-selected, .btn-delete-selected {
      font-size: 0.72rem;
      color: #8899aa;
      background: none;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-select-records.active { color: #fbbf24; border-color: #92400e; background: #1c1408; }
    .btn-duplicate-selected:hover { color: #4ade80; border-color: #4ade80; }
    .btn-delete-selected:hover { color: #e53e3e; border-color: #e53e3e; }

    /* フィルタータブ */
    .filter-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .filter-tab {
      padding: 5px 12px;
      background: #1a2535;
      border: 1px solid #2a3a50;
      border-radius: 16px;
      color: #8899aa;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-tab.active { background: #1d4ed8; border-color: #2563eb; color: #fff; font-weight: bold; }
    .filter-label {
      margin-bottom: 6px;
      color: #9f8a81;
      font-size: 0.68rem;
      font-weight: bold;
      letter-spacing: 0.04em;
    }
    .main-filter-tabs { margin-bottom: 10px; }
    .main-filter-tab { padding: 7px 14px; font-size: 0.78rem; }
    .sub-filter-wrap {
      display: none;
      margin: 0 0 12px 10px;
      padding-left: 10px;
      border-left: 3px solid #f4c4bd;
    }
    .sub-filter-wrap.visible { display: block; }

    .records-empty {
      text-align: center;
      color: #3a4a60;
      font-size: 0.88rem;
      padding: 24px 0;
    }

    .records-item {
      background: #111827;
      border: 1px solid #1e2a3a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .records-item:hover { border-color: #2563eb; background: #0f1e3a; }
    .records-item.selected { border-color: #2563eb; background: #0f1e3a; }

    .records-check { display: none; flex-shrink: 0; }
    .select-mode .records-check { display: block; }
    .records-check input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #2563eb;
      cursor: pointer;
    }
    .select-mode .records-arrow { display: none; }

    .records-item-body { flex: 1; min-width: 0; }

    .records-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .records-keyword {
      font-size: 0.95rem;
      color: #dde6f0;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    /* カテゴリバッジ */
    .cat-badge {
      font-size: 0.65rem;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
      white-space: nowrap;
      background: #0f2d55;
      border: 1px solid #2563eb;
      color: #93c5fd;
    }
    .cat-badge.ポケモンカード { background: #2a1a00; border: 1px solid #7a4a00; color: #f0b030; }
    .cat-badge.遊戯王カード     { background: #1a0a2e; border: 1px solid #5b2a8e; color: #a855f7; }
    .cat-badge.ワンピースカード { background: #2e0a0a; border: 1px solid #8e2a2a; color: #f87171; }
    .cat-badge.ゲーム           { background: #0a2020; border: 1px solid #0e6060; color: #2dd4bf; }
    .cat-badge.その他トレカ     { background: #1a2a1a; border: 1px solid #2a6a2a; color: #4ade80; }
    .cat-badge.フィギュア       { background: #2a1a2e; border: 1px solid #7a2a8e; color: #e879f9; }
    .cat-badge.その他           { background: #1a2535; border: 1px solid #2a3a50; color: #6a7a8a; }

    .records-meta {
      display: flex;
      gap: 12px;
      font-size: 0.72rem;
      color: #4a5568;
    }
    .records-price { color: #4a90d9; font-weight: bold; }

    .records-arrow { font-size: 0.85rem; color: #2a3a50; flex-shrink: 0; }

    .records-item-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ── 並び替えモード ── */
    .drag-handle {
      display: none;
      font-size: 1.2rem;
      color: #4a5568;
      padding: 4px 8px;
      cursor: grab;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .reorder-mode .drag-handle { display: block; }
    /* PC: 選択モード以外ではハンドルを常時表示、右側要素を横並びでスリムに */
    @media (hover: hover) and (pointer: fine) {
      #records-list:not(.select-mode) .drag-handle { display: block; }
      .records-item-right { flex-direction: row; align-items: center; }
      /* ハンドルの高さをバッジに合わせる */
      .drag-handle { padding: 4px 6px; font-size: 0.65rem; }
      /* バッジの縦paddingを編集ボタンに合わせて高さを統一 */
      .cat-badge { padding: 4px 8px; }
      /* 全モードで上揃えにしてバッジと右側要素の高さを合わせる */
      .records-item { align-items: flex-start; }
    }
    .reorder-mode .btn-records-edit { display: none !important; }
    .reorder-mode .records-arrow { display: none !important; }
    .records-item { transition: border-color 0.15s, background 0.15s, transform 0.18s ease; }
    .records-item.dragging { opacity: 0.15; }
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 500;
      background: #111827;
      border: 1px solid #2563eb;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      opacity: 0.92;
      transition: none !important;
    }
    .btn-done-reorder {
      display: none;
      font-size: 0.72rem;
      color: #4ade80;
      background: none;
      border: 1px solid #4ade80;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── タブ ── */
    .tab-bar {
      display: flex;
      width: 100%;
      max-width: 480px;
      margin-bottom: 20px;
      background: #111827;
      border: 1px solid #1e2a3a;
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      border-radius: 8px;
      color: #4a5568;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      letter-spacing: 0.03em;
      text-align: center;
    }
    .tab-btn.active { background: #1d4ed8; color: #fff; }

    .tab-panel { display: none; width: 100%; }
    .tab-panel.active { display: flex; flex-direction: column; align-items: center; }

    .records-section { margin-top: 0; }

    /* ── 明るいカラーテーマ ── */
    body { background: #fffaf7; color: #51423d; }
    h1 { color: #493a35; }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .title-row h1 { margin-bottom: 0; }
    .subtitle { color: #a08176; margin-bottom: 36px; }
    .otter-mascot {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 6px 8px rgba(126, 88, 72, 0.16));
    }
    .card, .records-item, .tab-bar {
      background: #ffffff;
      border-color: #eaded8;
      box-shadow: 0 8px 24px rgba(105, 76, 63, 0.08);
    }
    .field label { color: #7e6860; }
    .field input {
      background: #fffdfb;
      border-color: #dfd0c9;
      color: #493a35;
    }
    .field input:focus { border-color: #ef8f88; }
    .field input::placeholder, .price-unit { color: #b9a49b; }
    .cat-btn, .filter-tab, .btn-cancel-edit {
      background: #fff7f3;
      border-color: #ead7ce;
      color: #806a61;
    }
    .cat-btn.active, .filter-tab.active {
      background: #ef8f88;
      border-color: #e77f78;
      color: #ffffff;
    }
    .form-title, .records-header h2, .btn-records-edit { color: #de746d; }
    .btn-search, .tab-btn.active { background: #ef8f88; color: #ffffff; }
    .btn-search:hover { background: #e78079; }
    .tab-btn { color: #a38d84; }
    .records-keyword { color: #51423d; }
    .records-meta, .records-empty { color: #9f8a81; }
    .records-price { color: #df746d; }
    .cat-badge {
      background: #fff0eb;
      border-color: #efb2a9;
      color: #c76059;
    }
    .cat-badge.その他トレカ, .cat-badge.その他 {
      background: #fff0eb;
      border-color: #efb2a9;
      color: #c76059;
    }
    .records-item:hover, .records-item.selected {
      border-color: #ef8f88;
      background: #fff8f5;
    }
    .btn-records-edit, .btn-select-records, .btn-duplicate-selected, .btn-delete-selected {
      border-color: #dfd0c9;
      background: #ffffff;
    }
    .btn-admin, .btn-star { background: #ffffff; border-color: #dfd0c9; color: #947d73; }
    .records-arrow, .drag-handle { color: #b9a49b; }
  </style>
</head>
<body>

  <div class="title-row">
    <h1>Yahoo!ショッピング 価格調査</h1>
    <img class="otter-mascot" src="otter.png" alt="貝がらを持ったラッコ">
  </div>
  <p class="subtitle">価格＋送料が安い順で検索します</p>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-history" onclick="switchTab('history')">検索履歴</button>
    <button class="tab-btn" id="tab-btn-search" onclick="switchTab('search')">新規検索</button>
  </div>

  <div id="panel-search" class="tab-panel">
  <div class="card">
    <div class="form-header">
      <span class="form-title" id="form-title">新規検索</span>
      <button class="btn-cancel-edit" id="btn-cancel-edit" onclick="cancelEdit()" style="display:none">キャンセル</button>
    </div>
    <div class="field">
      <label>カテゴリ</label>
      <div class="cat-btns" id="cat-btns">
        <button class="cat-btn active" data-cat="ポケモン" onclick="selectCategory(this)">ポケモン</button>
        <button class="cat-btn" data-cat="ワンピ" onclick="selectCategory(this)">ワンピ</button>
        <button class="cat-btn" data-cat="遊戯王" onclick="selectCategory(this)">遊戯王</button>
        <button class="cat-btn" data-cat="ガンダム" onclick="selectCategory(this)">ガンダム</button>
        <button class="cat-btn" data-cat="ロルカナ" onclick="selectCategory(this)">ロルカナ</button>
        <button class="cat-btn" data-cat="デュエマ" onclick="selectCategory(this)">デュエマ</button>
        <button class="cat-btn" data-cat="ドラゴン" onclick="selectCategory(this)">ドラゴン</button>
        <button class="cat-btn" data-cat="ユニアリ" onclick="selectCategory(this)">ユニアリ</button>
        <button class="cat-btn" data-cat="ヴァイス" onclick="selectCategory(this)">ヴァイス</button>
        <button class="cat-btn" data-cat="ホロライブ" onclick="selectCategory(this)">ホロライブ</button>
        <button class="cat-btn" data-cat="コナン" onclick="selectCategory(this)">コナン</button>
        <button class="cat-btn" data-cat="サプライ" onclick="selectCategory(this)">サプライ</button>
        <button class="cat-btn" data-cat="ゲーム機・ゲーム関連" onclick="selectCategory(this)">ゲーム機・ゲーム関連</button>
        <button class="cat-btn" data-cat="スマートフォン" onclick="selectCategory(this)">スマートフォン</button>
        <button class="cat-btn" data-cat="おもちゃ・ホビー・フィギュア" onclick="selectCategory(this)">おもちゃ・ホビー・フィギュア</button>
        <button class="cat-btn" data-cat="文房具（ステーショナリー）" onclick="selectCategory(this)">文房具（ステーショナリー）</button>
      </div>
    </div>

    <div class="field">
      <label>商品名</label>
      <input type="text" id="inp-keyword" placeholder="例：ポケモンカード151 box" autocomplete="off">
    </div>

    <div class="field">
      <label>下限金額（円以上）</label>
      <div class="price-wrap">
        <input type="text" id="inp-price" placeholder="0" inputmode="numeric" oninput="formatPriceInput(this)">
        <span class="price-unit">円</span>
      </div>
    </div>

    <button class="btn-search" id="btn-search" onclick="search()">検索する</button>
  </div>
  </div><!-- /panel-search -->

  <div id="panel-history" class="tab-panel active">
  <div class="records-section">
    <div class="records-header">
      <h2>検索履歴</h2>
      <button class="btn-admin" id="btn-admin" onclick="unlockAdminMode()">★管理</button>
      <button class="btn-select-records" id="btn-select" onclick="toggleSelectMode()">選択</button>
      <button class="btn-done-reorder" id="btn-done-reorder" onclick="exitReorderMode()">完了</button>
      <button class="btn-duplicate-selected" id="btn-duplicate-selected" onclick="duplicateSelected()" style="display:none">複製</button>
      <button class="btn-delete-selected" id="btn-delete-selected" onclick="deleteSelected()" style="display:none">削除</button>
    </div>
    <div class="filter-label">大カテゴリ</div>
    <div class="filter-tabs main-filter-tabs" id="main-filter-tabs">
      <button class="filter-tab main-filter-tab active" data-main-filter="全て" onclick="setMainFilter(this)">すべて</button>
      <button class="filter-tab main-filter-tab" data-main-filter="トレカ" onclick="setMainFilter(this)">トレカ</button>
      <button class="filter-tab main-filter-tab" data-main-filter="ゲーム・デジタル" onclick="setMainFilter(this)">ゲーム・デジタル</button>
      <button class="filter-tab main-filter-tab" data-main-filter="ホビー" onclick="setMainFilter(this)">ホビー</button>
      <button class="filter-tab main-filter-tab" data-main-filter="文房具" onclick="setMainFilter(this)">文房具</button>
    </div>
    <div class="sub-filter-wrap" id="sub-filter-wrap">
      <div class="filter-label">小カテゴリ</div>
      <div class="filter-tabs" id="filter-tabs"></div>
    </div>
    <div id="records-list"></div>
  </div>
  </div><!-- /panel-history -->

  <div class="password-modal" id="password-modal" onclick="if(event.target === this) closePasswordModal(false)">
    <div class="password-dialog" role="dialog" aria-modal="true" aria-labelledby="password-title">
      <h3 id="password-title">管理用パスワード</h3>
      <p id="password-message"></p>
      <input type="password" id="admin-password" autocomplete="current-password" onkeydown="if(event.key === 'Enter') submitAdminPassword()">
      <div class="password-actions">
        <button class="password-cancel" onclick="closePasswordModal(false)">キャンセル</button>
        <button class="password-submit" onclick="submitAdminPassword()">確認</button>
      </div>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  // ── Firebase 初期化 ──
  firebase.initializeApp({
    apiKey: "AIzaSyCfvqQWLB8NJqmaH0k2G0wPcbJJjz2Vu4A",
    authDomain: "kaimemo-58bad.firebaseapp.com",
    projectId: "kaimemo-58bad",
    storageBucket: "kaimemo-58bad.firebasestorage.app",
    messagingSenderId: "308069117698",
    appId: "1:308069117698:web:c61a57853abb7e8ffb1c1b"
  });
  const db = firebase.firestore();
  const docRef = db.collection('data').doc('yahoo-price');

  const MAX_HISTORY = 300;
  const ADMIN_PASSWORD_HASH = '9993ab34dc5a607a533cf9cfe10c902b249c3d55f5d7b609269dc199f136f5db';
  let records = [];
  let selectMode = false;
  let selectedIdxs = new Set();
  let selectedCategory = 'ポケモン';
  let activeMainFilter = '全て';
  let activeFilter = '全て';
  let editingIdx = null;
  let reorderMode = false;
  let dragState = null;
  let activeTab = 'history';
  let adminMode = false;
  let passwordResolve = null;

  // ── タブ切り替え ──
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-btn-search').classList.toggle('active', tab === 'search');
    document.getElementById('tab-btn-history').classList.toggle('active', tab === 'history');
    document.getElementById('panel-search').classList.toggle('active', tab === 'search');
    document.getElementById('panel-history').classList.toggle('active', tab === 'history');
  }
  let longPressTimer = null;
  let longPressStart = { x: 0, y: 0 };

  // ── カテゴリ選択 ──
  function selectCategory(btn) {
    selectedCategory = btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function setCategoryByValue(value) {
    const cat = normalizeCategory(value);
    selectedCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
  }

  function normalizeCategory(value) {
    const legacyCategories = {
      'ポケモンカード': 'ポケモン',
      'ワンピースカード': 'ワンピ',
      '遊戯王カード': '遊戯王',
      'ゲーム': 'ゲーム機・ゲーム関連',
      'フィギュア': 'おもちゃ・ホビー・フィギュア'
    };
    return legacyCategories[value] || value || 'ポケモン';
  }

  const CATEGORY_GROUPS = {
    'トレカ': ['ポケモン', 'ワンピ', '遊戯王', 'ガンダム', 'ロルカナ', 'デュエマ', 'ドラゴン', 'ユニアリ', 'ヴァイス', 'ホロライブ', 'コナン', 'サプライ'],
    'ゲーム・デジタル': ['ゲーム機・ゲーム関連', 'スマートフォン'],
    'ホビー': ['おもちゃ・ホビー・フィギュア'],
    '文房具': ['文房具（ステーショナリー）']
  };

  function getMainCategory(category) {
    const cat = normalizeCategory(category);
    if (cat === 'その他トレカ') return 'トレカ';
    return Object.keys(CATEGORY_GROUPS).find(group => CATEGORY_GROUPS[group].includes(cat)) || 'その他';
  }

  function matchesActiveFilter(category) {
    const cat = normalizeCategory(category);
    if (activeFilter !== '全て') return cat === activeFilter;
    return activeMainFilter === '全て' || getMainCategory(cat) === activeMainFilter;
  }

  // ── フィルタータブ ──
  function setMainFilter(btn) {
    activeMainFilter = btn.dataset.mainFilter;
    activeFilter = '全て';
    document.querySelectorAll('.main-filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSubFilters();
    resetSelectModeForFilter();
    renderHistory();
  }

  function renderSubFilters() {
    const wrap = document.getElementById('sub-filter-wrap');
    const tabs = document.getElementById('filter-tabs');
    const categories = CATEGORY_GROUPS[activeMainFilter];
    wrap.classList.toggle('visible', !!categories);
    tabs.innerHTML = categories
      ? categories.map(cat => `<button class="filter-tab" data-filter="${cat}" onclick="setFilter(this)">${cat}</button>`).join('')
      : '';
  }

  function resetSelectModeForFilter() {
    if (!selectMode) return;
    selectMode = false;
    selectedIdxs.clear();
    document.getElementById('btn-select').textContent = '選択';
    document.getElementById('btn-select').classList.remove('active');
    document.getElementById('btn-duplicate-selected').style.display = 'none';
    document.getElementById('btn-delete-selected').style.display = 'none';
  }

  function setFilter(btn) {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('#filter-tabs .filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    resetSelectModeForFilter();
    renderHistory();
  }

  // ── 価格フォーマット ──
  function formatPriceInput(el) {
    const raw = el.value.replace(/[^\d]/g, '');
    el.value = raw ? Number(raw).toLocaleString('ja-JP') : '';
  }

  function getRawPrice() {
    return document.getElementById('inp-price').value.replace(/[^\d]/g, '');
  }

  // ── ★管理 ──
  async function hashPassword(value) {
    const data = new TextEncoder().encode(value);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function requestAdminPassword(message) {
    document.getElementById('password-message').textContent = message;
    const input = document.getElementById('admin-password');
    input.value = '';
    document.getElementById('password-modal').style.display = 'flex';
    setTimeout(() => input.focus(), 0);
    return new Promise(resolve => { passwordResolve = resolve; });
  }

  function closePasswordModal(result) {
    document.getElementById('password-modal').style.display = 'none';
    const resolve = passwordResolve;
    passwordResolve = null;
    if (resolve) resolve(result);
  }

  async function submitAdminPassword() {
    const password = document.getElementById('admin-password').value;
    const valid = await hashPassword(password) === ADMIN_PASSWORD_HASH;
    if (!valid) {
      alert('パスワードが違います');
      document.getElementById('admin-password').select();
      return;
    }
    closePasswordModal(true);
  }

  async function unlockAdminMode() {
    if (adminMode) {
      adminMode = false;
      document.getElementById('btn-admin').classList.remove('active');
      document.getElementById('btn-admin').textContent = '★管理';
      renderHistory();
      return;
    }
    if (!await requestAdminPassword('管理用パスワードを入力してください')) return;
    adminMode = true;
    document.getElementById('btn-admin').classList.add('active');
    document.getElementById('btn-admin').textContent = '管理終了';
    renderHistory();
  }

  function toggleStar(fullIdx) {
    if (!adminMode || !records[fullIdx]) return;
    records[fullIdx] = { ...records[fullIdx], starred: !records[fullIdx].starred };
    save();
    renderHistory();
  }

  // ── 履歴 ──
  function save() {
    docRef.set({ list: records }).catch(err => {
      alert('保存エラー: ' + err.message);
    });
  }

  function addHistory(keyword, price, category) {
    const entry = { keyword, price, category, datetime: formatDatetime(new Date()) };
    const filtered = records.filter(h => !(h.keyword === keyword && h.price === price && h.category === category));
    filtered.unshift(entry);
    records = filtered.slice(0, MAX_HISTORY);
    save();
    renderHistory();
  }

  // ── 選択モード ──
  function toggleSelectMode() {
    selectMode = !selectMode;
    selectedIdxs.clear();
    const btn = document.getElementById('btn-select');
    btn.textContent = selectMode ? 'キャンセル' : '選択';
    btn.classList.toggle('active', selectMode);
    document.getElementById('btn-duplicate-selected').style.display = 'none';
    document.getElementById('btn-delete-selected').style.display = 'none';
    renderHistory();
  }

  function toggleSelectItem(fullIdx) {
    if (selectedIdxs.has(fullIdx)) selectedIdxs.delete(fullIdx);
    else selectedIdxs.add(fullIdx);
    renderHistory();
  }

  function duplicateSelected() {
    if (!selectedIdxs.size) return;
    const now = formatDatetime(new Date());
    const copies = [...selectedIdxs]
      .sort((a, b) => a - b)
      .map(i => ({ ...records[i], datetime: now }));
    records = [...copies, ...records].slice(0, MAX_HISTORY);
    save();
    selectedIdxs.clear();
    selectMode = false;
    document.getElementById('btn-select').textContent = '選択';
    document.getElementById('btn-select').classList.remove('active');
    document.getElementById('btn-duplicate-selected').style.display = 'none';
    document.getElementById('btn-delete-selected').style.display = 'none';
    renderHistory();
  }

  async function deleteSelected() {
    if (!selectedIdxs.size) return;
    const includesStarred = [...selectedIdxs].some(i => records[i]?.starred);
    if (includesStarred && !await requestAdminPassword('★付き履歴を削除するには管理用パスワードが必要です')) return;
    records = records.filter((_, i) => !selectedIdxs.has(i));
    save();
    selectedIdxs.clear();
    selectMode = false;
    document.getElementById('btn-select').textContent = '選択';
    document.getElementById('btn-select').classList.remove('active');
    document.getElementById('btn-duplicate-selected').style.display = 'none';
    document.getElementById('btn-delete-selected').style.display = 'none';
    renderHistory();
  }

  // ── 描画 ──
  function renderHistory() {
    const list = document.getElementById('records-list');
    const filtered = records
      .map((h, i) => ({ ...h, _fullIdx: i }))
      .filter(h => matchesActiveFilter(h.category));

    list.classList.toggle('select-mode', selectMode);
    list.classList.toggle('reorder-mode', reorderMode);
    list.classList.toggle('admin-mode', adminMode);

    // 複製・削除ボタンの状態を常に同期
    const dupBtn = document.getElementById('btn-duplicate-selected');
    const delBtn = document.getElementById('btn-delete-selected');
    const show = selectMode && selectedIdxs.size > 0;
    dupBtn.style.display = show ? 'inline-block' : 'none';
    delBtn.style.display = show ? 'inline-block' : 'none';
    if (show) {
      dupBtn.textContent = `複製（${selectedIdxs.size}件）`;
      delBtn.textContent = `削除（${selectedIdxs.size}件）`;
    }

    if (!filtered.length) {
      list.innerHTML = '<div class="records-empty">履歴がありません</div>';
      return;
    }

    if (reorderMode) {
      list.innerHTML = filtered.map((h, fi) => {
        const cat = normalizeCategory(h.category);
        return `
          <div class="records-item" data-filter-idx="${fi}" onclick="onItemClick(${h._fullIdx})">
            <div class="records-item-body">
              <div class="records-top">
                <div class="records-keyword">${h.keyword.replace(/</g, '&lt;')}</div>
                ${h.starred ? '<span class="history-star" title="重要な履歴">★</span>' : ''}
                <span class="cat-badge ${cat}">${cat}</span>
              </div>
              <div class="records-meta">
                <span class="records-price">${h.price ? '¥' + Number(h.price).toLocaleString('ja-JP') + ' 以上' : '下限なし'}</span>
                <span>${h.datetime}</span>
              </div>
            </div>
            <div class="records-item-right">
              <span class="drag-handle" data-filter-idx="${fi}">☰</span>
            </div>
          </div>`;
      }).join('');
    } else {
      list.innerHTML = filtered.map((h, fi) => {
        const cat = normalizeCategory(h.category);
        const isSelected = selectedIdxs.has(h._fullIdx);
        return `
          <div class="records-item${isSelected ? ' selected' : ''}" data-idx="${h._fullIdx}" data-filter-idx="${fi}" onclick="onItemClick(${h._fullIdx})">
            <div class="records-check"><input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleSelectItem(${h._fullIdx})"></div>
            <div class="records-item-body">
              <div class="records-top">
                <div class="records-keyword">${h.keyword.replace(/</g, '&lt;')}</div>
                ${h.starred ? '<span class="history-star" title="重要な履歴">★</span>' : ''}
                <span class="cat-badge ${cat}">${cat}</span>
              </div>
              <div class="records-meta">
                <span class="records-price">${h.price ? '¥' + Number(h.price).toLocaleString('ja-JP') + ' 以上' : '下限なし'}</span>
                <span>${h.datetime}</span>
              </div>
            </div>
            <div class="records-item-right">
              <button class="btn-star" onclick="event.stopPropagation(); toggleStar(${h._fullIdx})">${h.starred ? '★解除' : '★付与'}</button>
              <button class="btn-records-edit" onclick="event.stopPropagation(); editHistory(${h._fullIdx})">編集</button>
              <span class="records-arrow">›</span>
              <span class="drag-handle" data-filter-idx="${fi}">☰</span>
            </div>
          </div>`;
      }).join('');
    }

    // タッチ・マウス共通でドラッグハンドルにイベントを登録
    list.querySelectorAll('.drag-handle').forEach(handle => {
      const fi = Number(handle.dataset.filterIdx);
      handle.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        startDragAt(fi, t.clientX, t.clientY);
      }, { passive: false });
      handle.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        e.preventDefault();
        if (!reorderMode) enterReorderMode();
        startDragAt(fi, e.clientX, e.clientY);
      });
    });
  }

  function onItemClick(fullIdx) {
    if (reorderMode) return;
    if (selectMode) { toggleSelectItem(fullIdx); return; }
    searchFromHistory(fullIdx);
  }

  function searchFromHistory(fullIdx) {
    const h = records[fullIdx];
    if (!h) return;
    setCategoryByValue(h.category);
    document.getElementById('inp-keyword').value = h.keyword;
    document.getElementById('inp-price').value = h.price ? Number(h.price).toLocaleString('ja-JP') : '';
    openSearch(h.keyword, h.price);
  }

  // ── 検索 ──
  function formatDatetime(d) {
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function editHistory(fullIdx) {
    const h = records[fullIdx];
    if (!h) return;
    editingIdx = fullIdx;
    setCategoryByValue(h.category);
    document.getElementById('inp-keyword').value = h.keyword;
    document.getElementById('inp-price').value = h.price ? Number(h.price).toLocaleString('ja-JP') : '';
    document.getElementById('form-title').textContent = '編集中';
    document.getElementById('btn-search').textContent = '更新する';
    document.getElementById('btn-search').classList.add('editing');
    document.getElementById('btn-cancel-edit').style.display = 'block';
    switchTab('search');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingIdx = null;
    setCategoryByValue('ポケモン');
    document.getElementById('inp-keyword').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('form-title').textContent = '新規検索';
    document.getElementById('btn-search').textContent = '検索する';
    document.getElementById('btn-search').classList.remove('editing');
    document.getElementById('btn-cancel-edit').style.display = 'none';
    switchTab('history');
  }

  function search() {
    const keyword = document.getElementById('inp-keyword').value.trim();
    if (!keyword) { document.getElementById('inp-keyword').focus(); return; }
    const price = getRawPrice();

    if (editingIdx !== null) {
      if (records[editingIdx]) {
        records[editingIdx] = { ...records[editingIdx], keyword, price, category: selectedCategory };
        save();
        renderHistory();
      }
      cancelEdit();
      return;
    }

    addHistory(keyword, price, selectedCategory);
    openSearch(keyword, price);
    switchTab('history');
  }

  function openSearch(keyword, price) {
    const term = encodeURIComponent(keyword).replace(/%20/g, '+');
    const pf = price ? `&pf=${price}` : '';
    const url = `https://shopping.yahoo.co.jp/search/${term}/0/?X=12&tab_ex=commerce&area=14&sc_i=shopping-pc-web-result-item-prcrange-fltrbtn${pf}`;
    window.open(url, '_blank');
  }

  // ── 並び替えモード ──
  function enterReorderMode() {
    if (selectMode) toggleSelectMode();
    reorderMode = true;
    document.getElementById('btn-select').style.display = 'none';
    document.getElementById('btn-done-reorder').style.display = 'inline-block';
    renderHistory();
    if (navigator.vibrate) navigator.vibrate(40);
  }

  function exitReorderMode() {
    reorderMode = false;
    document.getElementById('btn-select').style.display = '';
    document.getElementById('btn-done-reorder').style.display = 'none';
    renderHistory();
  }

  function startDragAt(filterIdx, clientX, clientY) {
    const cardEl = document.querySelector(`.records-item[data-filter-idx="${filterIdx}"]`);
    if (!cardEl) return;
    const rect = cardEl.getBoundingClientRect();
    const ghost = cardEl.cloneNode(true);
    ghost.className = 'records-item drag-ghost';
    ghost.style.left  = `${rect.left}px`;
    ghost.style.top   = `${rect.top}px`;
    ghost.style.width = `${rect.width}px`;
    document.body.appendChild(ghost);
    cardEl.classList.add('dragging');
    document.body.style.cursor = 'grabbing';
    document.body.style.userSelect = 'none';
    dragState = { filterIdx, cardEl, ghost, offsetY: clientY - rect.top, startY: clientY, moved: false, targetIdx: null, scrollTimer: null, lastClientY: clientY };
  }

  function updateDragPositions(clientY) {
    if (!dragState) return;
    const allCards = [...document.querySelectorAll('.records-item:not(.drag-ghost)')];
    const srcIdx = dragState.filterIdx;
    let targetIdx = allCards.length;
    for (let i = 0; i < allCards.length; i++) {
      if (i === srcIdx) continue;
      const rb = allCards[i].getBoundingClientRect();
      const matrix = new DOMMatrix(getComputedStyle(allCards[i]).transform);
      if (clientY < rb.top - matrix.m42 + rb.height / 2) { targetIdx = i; break; }
    }
    dragState.targetIdx = targetIdx;
    const shiftPx = (allCards[srcIdx]?.getBoundingClientRect().height ?? 0) + 8;
    allCards.forEach((c, i) => {
      if (i === srcIdx) return;
      if (targetIdx <= srcIdx)
        c.style.transform = (i >= targetIdx && i < srcIdx) ? `translateY(${shiftPx}px)` : '';
      else
        c.style.transform = (i > srcIdx && i <= targetIdx - 1) ? `translateY(-${shiftPx}px)` : '';
    });
  }

  function moveDragAt(clientY) {
    if (!dragState) return;
    const { ghost, offsetY } = dragState;
    if (Math.abs(clientY - dragState.startY) > 8) dragState.moved = true;
    dragState.lastClientY = clientY;
    ghost.style.top = `${clientY - offsetY}px`;
    if (!dragState.moved) return;

    updateDragPositions(clientY);

    // 画面端で自動スクロール
    clearInterval(dragState.scrollTimer);
    dragState.scrollTimer = null;
    const ZONE = 80, MAX_SPEED = 12;
    if (clientY < ZONE) {
      const speed = MAX_SPEED * (1 - clientY / ZONE);
      dragState.scrollTimer = setInterval(() => {
        window.scrollBy(0, -speed);
        if (dragState) updateDragPositions(dragState.lastClientY);
      }, 16);
    } else if (clientY > window.innerHeight - ZONE) {
      const speed = MAX_SPEED * ((clientY - (window.innerHeight - ZONE)) / ZONE);
      dragState.scrollTimer = setInterval(() => {
        window.scrollBy(0, speed);
        if (dragState) updateDragPositions(dragState.lastClientY);
      }, 16);
    }
  }

  function endDrag() {
    if (!dragState) return;
    const { ghost, cardEl, filterIdx, targetIdx, moved } = dragState;
    clearInterval(dragState.scrollTimer);
    ghost.remove();
    cardEl.classList.remove('dragging');
    document.querySelectorAll('.records-item:not(.drag-ghost)').forEach(c => c.style.transform = '');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    dragState = null;
    if (!moved) { exitReorderMode(); return; }
    if (targetIdx === null || targetIdx === filterIdx) { renderHistory(); return; }

    // フィルター済みリストのスナップショット
    const filtered = records
      .map((h, i) => ({ ...h, _fullIdx: i }))
      .filter(h => matchesActiveFilter(h.category));

    // フィルター内で並び替え
    const newFiltered = [...filtered];
    const [item] = newFiltered.splice(filterIdx, 1);
    newFiltered.splice(targetIdx > filterIdx ? targetIdx - 1 : targetIdx, 0, item);

    // フィルターアイテムが占めていたスロットに新順序で書き戻す
    const slots = filtered.map(h => h._fullIdx);
    const newRecords = [...records];
    newFiltered.forEach((h, i) => { newRecords[slots[i]] = records[h._fullIdx]; });
    records = newRecords;
    save();
    renderHistory();
  }

  // ── 長押しでリオーダーモード突入 ──
  const listEl = document.getElementById('records-list');
  listEl.addEventListener('touchstart', e => {
    if (reorderMode || selectMode) return;
    const card = e.target.closest('.records-item');
    if (!card || e.target.closest('button') || e.target.closest('input')) return;
    longPressStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    longPressTimer = setTimeout(() => { longPressTimer = null; enterReorderMode(); }, 600);
  }, { passive: true });
  listEl.addEventListener('touchmove', e => {
    if (!longPressTimer) return;
    if (Math.abs(e.touches[0].clientX - longPressStart.x) > 10 || Math.abs(e.touches[0].clientY - longPressStart.y) > 10) {
      clearTimeout(longPressTimer); longPressTimer = null;
    }
  }, { passive: true });
  listEl.addEventListener('touchend', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  }, { passive: true });

  document.addEventListener('touchmove', e => { if (dragState) { e.preventDefault(); moveDragAt(e.touches[0].clientY); } }, { passive: false });
  document.addEventListener('touchend', () => { if (dragState) endDrag(); });
  document.addEventListener('mousemove', e => { if (dragState) moveDragAt(e.clientY); });
  document.addEventListener('mouseup',   () => { if (dragState) endDrag(); });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  document.getElementById('records-list').innerHTML = '';
  docRef.onSnapshot(snap => {
    if (dragState) return;
    records = snap.exists ? (snap.data().list || []) : [];
    renderHistory();
  });
</script>

</body>
</html>
